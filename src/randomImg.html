<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="stylesTwo.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <title>Random Image 1-100</title>
  </head>
  <body style="background:black">
    <button onclick="randomImg()">Click me for new image</button>
    <script>
        function randomImg() {
            const randomNum = Math.floor(Math.random() * 100);
            let imgEle = document.getElementById("theImg");
            
            axios.get(`https://picsum.photos/id/${randomNum}/info`).then((picSum) => {
                
                if (imgEle) {
                    imgEle.src = picSum.data.download_url;
                }
                else {
                    const img = document.createElement("img");
                    img.src = picSum.data.download_url;
                    img.id = "theImg";
                    document.body.appendChild(img);
                }
            });
        }
    </script>
  </body>

</html>
